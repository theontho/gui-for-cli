# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
tone_instructions: |
  Be concise and direct. Focus on correctness, security, and maintainability.
  Skip nits about style/formatting (handled by swift-format).

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/.build/**"
    - "!**/DerivedData/**"
    - "!**/Derived/**"
    - "!**/*.xcodeproj/**"
    - "!**/*.xcworkspace/**"
    - "!Package.resolved"
    - "!out/**"
    - "!tmp/**"
    - "!scratch/**"
    - "!**/*.lock"
    - "!**/node_modules/**"
  path_instructions:
    - path: "Sources/**/*.swift"
      instructions: |
        Reusable business logic lives in GUIForCLICore; CLI parsing/output in GUIForCLICLI.
        Prefer explicit error handling over force unwraps/tries. Use Codable value types for config/data.
        This is greenfield — do not suggest backward-compatibility shims or deprecation paths.
    - path: "Apps/**/*.swift"
      instructions: |
        SwiftUI app code. Shared views live in Apps/Shared. Watch for Swift 6.2 type-checker
        timeouts when chaining multiple sorted-dictionary .map{...}.joined() calls inline —
        pre-bind to typed [String] instead.
    - path: "Tests/**/*.swift"
      instructions: |
        XCTest-based. Verify both success and failure paths; avoid silent nil checks.
    - path: "scripts/**"
      instructions: |
        Verify both interactive and non-interactive behavior.
    - path: "WebUI/**/*.{mjs,js}"
      instructions: |
        Vanilla ES modules (no bundler/framework). Keep dependencies minimal.
        server.mjs is a small Node HTTP server; app.mjs is browser-side.
        Shared code in WebUI/shared must run in both Node and the browser — no Node-only
        APIs (fs, path, process) outside server.mjs. Prefer fetch + standard Web APIs.
    - path: "WebUI/**/*.{html,css}"
      instructions: |
        Plain HTML/CSS, no framework. Watch for accessibility: every interactive control
        needs a label/aria-label; semantic elements over div soup.
    - path: "WebUI/tests/**"
      instructions: |
        Verify both happy-path and error responses. Keep tests runnable via `node --test`.
    - path: "**/*.md"
      instructions: |
        Documentation. Skip prose nits unless content is misleading or incorrect.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
