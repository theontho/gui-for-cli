"exitCodes.default.126.title" = "কমান্ড পাওয়া গেছে কিন্তু executable নয়"
"exitCodes.default.126.summary" = "কমান্ড বা script আছে, কিন্তু চালানো যায়নি। file permission এবং setup সফলভাবে সম্পন্ন হয়েছে কিনা পরীক্ষা করুন।"
"exitCodes.default.127.title" = "কমান্ড পাওয়া যায়নি"
"exitCodes.default.127.summary" = "command runner executable খুঁজে পায়নি। এই bundle-এর জন্য setup চালান এবং persistent runtime workspace আছে কিনা যাচাই করুন।"
"exitCodes.default.130.title" = "কমান্ড বাতিল করা হয়েছে"
