"exitCodes.default.1.summary" = "কমান্ডটি একটি সাধারণ ব্যর্থতা জানিয়েছে। নির্দিষ্ট WGS Extract বা tool ত্রুটির জন্য উপরের আউটপুট দেখুন।"
"exitCodes.default.2.title" = "কমান্ড-লাইন ব্যবহারের ত্রুটি"
