"exitCodes.default.127.summary" = "Uruchamiacz poleceń nie mógł znaleźć pliku wykonywalnego. Uruchom konfigurację dla tego pakietu i sprawdź, czy istnieje trwały obszar roboczy środowiska uruchomieniowego."
"exitCodes.default.130.title" = "Polecenie anulowane"
