name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Lint, Test, and Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tuist
        run: brew install tuist

      - name: Run CI pipeline
        run: python3 scripts/ci-local.py --skip-tuist-install
