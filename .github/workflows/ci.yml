name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Lint, Test, and Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode (Swift 6.2+)
        run: |
          # Pick the newest installed Xcode so swift-tools-version 6.2 resolves.
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$latest" ]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Install Tuist
        run: brew install tuist

      - name: Run CI pipeline
        run: python3 scripts/ci-local.py --skip-tuist-install

  linux:
    name: Linux Swift Package
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: swift build
        run: swift build --package-path platform/apple

      - name: swift test
        run: swift test --package-path platform/apple --parallel
