name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed platforms
    runs-on: ubuntu-latest
    outputs:
      apple: ${{ steps.paths.outputs.apple }}
      typescript: ${{ steps.paths.outputs.typescript }}
      rust: ${{ steps.paths.outputs.rust }}
      go: ${{ steps.paths.outputs.go }}
      cpp: ${{ steps.paths.outputs.cpp }}
      dotnet: ${{ steps.paths.outputs.dotnet }}
      python: ${{ steps.paths.outputs.python }}
      meta: ${{ steps.paths.outputs.meta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 tools/ci/ci_changed_paths.py --base "$BASE_SHA" --head "$HEAD_SHA"

  meta:
    name: Repository metadata
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.meta == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate CI scripts and Makefile
        run: |
          python3 -m compileall -q scripts/setup-hooks.py tools/ci tools/localization tools/packaging tools/platform.py tools/platform_runner
          python3 -m unittest discover -s tools/ci/tests
          python3 -m unittest discover -s tools/localization/tests
          python3 -m unittest discover -s tools/packaging/tests
          python3 tools/platform.py list >/dev/null
          make help >/dev/null

  apple:
    name: Apple macOS
    runs-on: macos-latest
    timeout-minutes: 60
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode (Swift 6.2+)
        run: |
          # Pick the newest installed Xcode so swift-tools-version 6.2 resolves.
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$latest" ]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Tuist
        if: github.event_name != 'pull_request'
        run: brew install tuist

      - name: Cache Apple build products
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
            platform/apple/.build
            platform/apple/DerivedData
          key: ${{ runner.os }}-apple-${{ hashFiles('platform/apple/Package.resolved', 'platform/apple/Package.swift', 'platform/apple/shared/Package.swift', 'platform/apple/Project.swift', 'platform/apple/Tuist.swift') }}
          restore-keys: |
            ${{ runner.os }}-apple-

      - name: Run Apple CI (PR package/CLI)
        if: github.event_name == 'pull_request'
        timeout-minutes: 10
        run: uv run python tools/ci/ci_local.py --skip-tuist-install --group apple --fast

      - name: Run Apple CI (full)
        if: github.event_name != 'pull_request'
        timeout-minutes: 50
        run: uv run python tools/ci/ci_local.py --skip-tuist-install --group apple

  linux:
    name: Linux Swift Package
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache SwiftPM build products
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
            platform/apple/.build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('platform/apple/Package.resolved', 'platform/apple/Package.swift', 'platform/apple/shared/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: swift build
        run: swift build --package-path platform/apple

      - name: swift test
        run: swift test --package-path platform/apple --parallel

  typescript:
    name: TypeScript Web/TUI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: platform/typescript

      - name: Run TypeScript tests
        run: npm --prefix platform/typescript test

  rust:
    name: Rust experimental renderers
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Rust builds
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            exp-platform/rust/*/target
          key: ${{ runner.os }}-rust-experimental-${{ hashFiles('exp-platform/rust/**/Cargo.lock', 'exp-platform/rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-experimental-

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Rust CI
        run: uv run python tools/ci/ci_local.py --group rust

  go:
    name: Go experimental renderers
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.0"

      - name: Run Go tests
        run: |
          cd exp-platform/go/gio && go test ./...
          cd ../fyne && GOTOOLCHAIN=go1.25.0 go test ./...

  cpp:
    name: C++ experimental renderers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Validate Qt/QML sources
        run: uv run python tools/ci/ci_local.py --group cpp

  dotnet:
    name: .NET experimental renderers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Test Avalonia renderer
        run: make test PLATFORM=avalonia

  python:
    name: Python experimental renderers
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Python renderer tests
        run: make test PLATFORM=python

  check:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    needs: [changes, meta, apple, linux, typescript, rust, go, cpp, dotnet, python]
    if: always()
    steps:
      - name: Verify selected checks
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failed:
              print(f"Failing prerequisite jobs: {failed}", file=sys.stderr)
              sys.exit(1)
          print("Selected CI jobs completed successfully.")
          PY
