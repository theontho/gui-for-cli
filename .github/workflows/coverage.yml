name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: swift test + Codecov
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect Apple changes
        id: paths
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 tools/ci/ci_changed_paths.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Skip coverage
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple != 'true'
        run: echo "No Apple package changes detected; skipping Swift coverage."

      - name: Skip pull request coverage
        if: github.event_name == 'pull_request'
        run: echo "Swift coverage runs on main pushes and manual dispatches; PRs use package tests in CI."

      - name: Select Xcode (Swift 6.2+)
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple == 'true'
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          swift --version

      - name: Cache SwiftPM build products
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
            platform/apple/.build
          key: ${{ runner.os }}-swiftpm-coverage-${{ hashFiles('platform/apple/Package.resolved', 'platform/apple/Package.swift', 'platform/apple/shared/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-coverage-
            ${{ runner.os }}-swiftpm-

      - name: swift test (with coverage)
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple == 'true'
        timeout-minutes: 15
        run: swift test --package-path platform/apple --enable-code-coverage

      - name: Export lcov
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple == 'true'
        timeout-minutes: 5
        run: |
          BIN_PATH="$(swift build --package-path platform/apple --show-bin-path)"
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          XCTEST_BINARIES=()
          while IFS= read -r -d '' xctest; do
            if [ -d "${xctest}" ]; then
              executable="${xctest}/Contents/MacOS/$(basename "${xctest}" .xctest)"
              if [ -x "${executable}" ]; then
                XCTEST_BINARIES+=("${executable}")
              else
                for executable in "${xctest}/Contents/MacOS/"*; do
                  if [ -f "${executable}" ] && [ -x "${executable}" ]; then
                    XCTEST_BINARIES+=("${executable}")
                  fi
                done
              fi
            elif [ -x "${xctest}" ]; then
              XCTEST_BINARIES+=("${xctest}")
            fi
          done < <(find "${BIN_PATH}" -maxdepth 2 -name '*.xctest' -print0)
          if [ "${#XCTEST_BINARIES[@]}" -eq 0 ]; then
            echo "No .xctest executables found under ${BIN_PATH}" >&2
            exit 1
          fi
          xcrun llvm-cov export -format=lcov \
            -instr-profile "${PROFDATA}" \
            -ignore-filename-regex='platform/apple/\.build/|platform/apple/shared/Tests/' \
            "${XCTEST_BINARIES[@]}" > coverage.lcov
          wc -l coverage.lcov

      - name: Upload to Codecov
        if: github.event_name != 'pull_request' && steps.paths.outputs.apple == 'true'
        timeout-minutes: 5
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          # Token not required for public repos but recommended.
