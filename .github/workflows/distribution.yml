name: Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  tauri:
    name: Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
            artifact_name: tauri-macos
          - os: linux
            runner: ubuntu-24.04
            artifact_name: tauri-linux
          - os: windows
            runner: windows-latest
            artifact_name: tauri-windows
    env:
      PYTHON: python3
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos' && (secrets.APPLE_SIGNING_IDENTITY || '-') || secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY || secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_UPDATER_ENDPOINTS: ${{ vars.TAURI_UPDATER_ENDPOINTS }}
      TAURI_UPDATER_ENDPOINT: ${{ vars.TAURI_UPDATER_ENDPOINT }}
      # Tauri's macOS updater archive must be codesigned even for unsigned CI
      # releases; "-" requests ad-hoc signing when no Developer ID identity exists.
      TAURI_MACOS_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "PACKAGE_APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            zstd

      - name: Select Xcode
        if: matrix.os == 'macos'
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version

      - name: Import Apple distribution certificate
        if: matrix.os == 'macos' && env.APPLE_CERTIFICATE_P12 != ''
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p runner build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p runner build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain-db
          security default-keychain -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k runner build.keychain
          rm -f certificate.p12

      - name: Install WebUI dependencies
        run: npm ci --prefix platform/typescript

      - name: Package Tauri app
        if: matrix.os != 'windows'
        run: make package PLATFORM=tauri

      - name: Package Tauri app (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: python3.exe tools\platform.py package tauri

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: out/release/tauri/*
          if-no-files-found: error

  swiftui-macos:
    name: SwiftUI macOS
    runs-on: macos-latest
    env:
      PYTHON: python3
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SPARKLE_APPCAST_URL: ${{ vars.SPARKLE_APPCAST_URL }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "PACKAGE_APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tuist
        run: brew install tuist

      - name: Import Apple distribution certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p runner build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p runner build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security list-keychains -d user -s build.keychain login.keychain-db
          security default-keychain -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k runner build.keychain
          rm -f certificate.p12

      - name: Store Apple notarization credentials
        if: env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          xcrun notarytool store-credentials ci-notary-profile \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          echo "APPLE_NOTARY_PROFILE=ci-notary-profile" >> "$GITHUB_ENV"

      - name: Check Apple signing identity
        if: env.APPLE_CERTIFICATE_P12 != ''
        run: security find-identity -v -p codesigning

      - name: Generate Apple workspace
        run: make setup PLATFORM=apple-project

      - name: Package SwiftUI app
        run: make package PLATFORM=swiftui-macos

      - name: Sign Sparkle update artifacts
        if: env.SPARKLE_PRIVATE_ED_KEY != ''
        run: |
          sign_update="platform/apple/DerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update"
          if [ ! -x "$sign_update" ]; then
            sign_update="$(find platform/apple/DerivedData/SourcePackages -path '*/Sparkle/bin/sign_update' -type f -perm -111 | head -n 1)"
          fi
          if [ -z "$sign_update" ] || [ ! -x "$sign_update" ]; then
            echo "Sparkle sign_update tool was not found after resolving Swift packages." >&2
            exit 1
          fi

          found=0
          while IFS= read -r -d '' dmg; do
            found=1
            printf '%s' "$SPARKLE_PRIVATE_ED_KEY" \
              | "$sign_update" --ed-key-file - "$dmg" \
              > "$dmg.sparkle-signature"
          done < <(find out/release/swiftui -type f -name '*.dmg' -print0)

          if [ "$found" -eq 0 ]; then
            echo "No SwiftUI DMG artifacts were found to sign for Sparkle." >&2
            exit 1
          fi

      - name: Upload SwiftUI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: swiftui-macos
          path: out/release/swiftui/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: macos-latest
    permissions:
      contents: write
    needs:
      - tauri
      - swiftui-macos
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      GH_TOKEN: ${{ github.token }}
      SPARKLE_SIGN_UPDATE: ${{ vars.SPARKLE_SIGN_UPDATE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate updater feeds
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 tools/packaging/generate_update_feeds.py \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --version "$version" \
            --artifacts-root release-artifacts \
            --output-dir release-artifacts/update-feeds

      - name: Stage release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          find release-artifacts -type f -print0 | while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            case "$name" in
              appcast.xml|latest.json|*.sig|*.sparkle-signature|*.dmg|*.AppImage|*.deb|*.rpm|*.pkg.tar.zst|*.tar.gz|*-setup.exe|*-quick-uninstall.ps1)
                asset_name="${name// /.}"
                cp "$file" "release-assets/$asset_name"
                ;;
            esac
          done
          test -n "$(find release-assets -type f -print -quit)"
          find release-assets -type f -print | sort

      - name: Publish release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            create_args=("$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-from-tag)
            if [[ "$version" == *-* ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
