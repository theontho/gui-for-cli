name: Windows native

on:
  pull_request:
    paths:
      - ".github/workflows/windows.yml"
      - "exp-platform/windows/dotnet/GUIForCLIWindows/**"
      - "exp-platform/go/gio/**"
      - "exp-platform/rust/dioxus-shell/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.Core/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.CoreTests/**"
      - "examples/**"
      - "platform/typescript/**"
      - "docs/schema/manifest.schema.json"
      - "make.ps1"
      - "tools/accessibility/windows_ax_smoke.ps1"
      - "scripts/validate-windows-tauri-update.ps1"
      - "tools/ci/ci_changed_paths.py"
      - "tools/packaging/windows/**"
      - "tools/platform.py"
      - "tools/platform_runner/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "exp-platform/windows/dotnet/GUIForCLIWindows/**"
      - "exp-platform/go/gio/**"
      - "exp-platform/rust/dioxus-shell/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.Core/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.CoreTests/**"
      - "examples/**"
      - "platform/typescript/**"
      - "docs/schema/manifest.schema.json"
      - "make.ps1"
      - "tools/accessibility/windows_ax_smoke.ps1"
      - "scripts/validate-windows-tauri-update.ps1"
      - "tools/ci/ci_changed_paths.py"
      - "tools/packaging/windows/**"
      - "tools/platform.py"
      - "tools/platform_runner/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Windows changes
    runs-on: ubuntu-latest
    outputs:
      windows_app: ${{ steps.paths.outputs.windows_app }}
      windows_core: ${{ steps.paths.outputs.windows_core }}
      windows_gio: ${{ steps.paths.outputs.windows_gio }}
      windows_dioxus: ${{ steps.paths.outputs.windows_dioxus }}
      windows_webui: ${{ steps.paths.outputs.windows_webui }}
      windows_tauri: ${{ steps.paths.outputs.windows_tauri }}
      windows_accessibility: ${{ steps.paths.outputs.windows_accessibility }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 tools/ci/ci_changed_paths.py --base "$BASE_SHA" --head "$HEAD_SHA"

  windows-app:
    name: Windows app
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_app == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows app
        shell: pwsh
        run: python tools\platform.py build windows

  windows-core:
    name: Windows core tests
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_core == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Test Windows core
        shell: pwsh
        run: python tools\platform.py test windows-core

  gio:
    name: Gio shell
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_gio == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.0"

      - name: Build Gio shell
        shell: pwsh
        run: |
          Set-Location exp-platform/go/gio
          go build ./...

  dioxus:
    name: Dioxus shell
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_dioxus == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json

      - name: Install WebUI dependencies
        run: npm ci --ignore-scripts
        working-directory: platform/typescript

      - name: Cache Dioxus Rust build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            exp-platform/rust/dioxus-shell/target
          key: ${{ runner.os }}-dioxus-shell-${{ hashFiles('exp-platform/rust/dioxus-shell/Cargo.lock', 'exp-platform/rust/dioxus-shell/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-dioxus-shell-

      - name: Build Dioxus shell
        shell: pwsh
        run: python tools\platform.py build dioxus

  webui:
    name: Windows WebUI
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_webui == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json

      - name: Install WebUI dependencies
        run: npm ci --ignore-scripts
        working-directory: platform/typescript

      - name: WebUI typecheck
        run: npm run check
        working-directory: platform/typescript

      - name: WebUI tests
        run: npm test
        working-directory: platform/typescript

  tauri-installer:
    name: Tauri WebUI installer
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_tauri == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json

      - name: Install WebUI dependencies
        run: npm ci
        working-directory: platform/typescript

      - name: Cache Tauri Rust build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            platform/typescript/web/packagers/tauri/target
          key: ${{ runner.os }}-tauri-webui-${{ hashFiles('platform/typescript/web/packagers/tauri/Cargo.lock', 'platform/typescript/web/packagers/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-tauri-webui-

      - name: Build Tauri WebUI installer
        shell: pwsh
        run: python tools\platform.py package tauri

      - name: Upload Tauri WebUI installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-tauri-webui-installer
          path: out/release/tauri/*.exe
          if-no-files-found: error

  accessibility:
    name: Static Windows accessibility smoke
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows_accessibility == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Static Windows accessibility smoke
        shell: pwsh
        run: ./tools/accessibility/windows_ax_smoke.ps1 -StaticOnly

  windows-native:
    name: windows-native
    runs-on: ubuntu-latest
    needs:
      - changes
      - windows-app
      - windows-core
      - gio
      - dioxus
      - webui
      - tauri-installer
      - accessibility
    if: always()
    steps:
      - name: Verify selected Windows jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failed:
              print(f"Failing prerequisite jobs: {failed}", file=sys.stderr)
              sys.exit(1)
          print("Selected Windows jobs completed successfully.")
          PY
