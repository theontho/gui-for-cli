name: Windows native

on:
  pull_request:
    paths:
      - ".github/workflows/windows.yml"
      - "exp-platform/windows/dotnet/GUIForCLIWindows/**"
      - "exp-platform/go/gio/**"
      - "exp-platform/rust/dioxus-shell/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.Core/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.CoreTests/**"
      - "examples/**"
      - "platform/typescript/**"
      - "docs/schema/manifest.schema.json"
      - "make.ps1"
      - "tools/ci/ci_changed_paths.py"
      - "tools/platform.py"
      - "tools/platform_runner/**"
      - "tools/accessibility/windows_ax_smoke.ps1"
      - "tools/packaging/windows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "exp-platform/windows/dotnet/GUIForCLIWindows/**"
      - "exp-platform/go/gio/**"
      - "exp-platform/rust/dioxus-shell/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.Core/**"
      - "exp-platform/windows/dotnet/GUIForCLIWindows.CoreTests/**"
      - "examples/**"
      - "platform/typescript/**"
      - "docs/schema/manifest.schema.json"
      - "make.ps1"
      - "tools/ci/ci_changed_paths.py"
      - "tools/platform.py"
      - "tools/platform_runner/**"
      - "tools/accessibility/windows_ax_smoke.ps1"
      - "tools/packaging/windows/**"

permissions:
  contents: read

concurrency:
  group: windows-native-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Windows changes
    runs-on: ubuntu-latest
    outputs:
      windows_dotnet: ${{ steps.paths.outputs.windows_dotnet }}
      windows_typescript: ${{ steps.paths.outputs.windows_typescript }}
      windows_go: ${{ steps.paths.outputs.windows_go }}
      windows_dioxus: ${{ steps.paths.outputs.windows_dioxus }}
      windows_tauri: ${{ steps.paths.outputs.windows_tauri }}
      windows_accessibility: ${{ steps.paths.outputs.windows_accessibility }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: paths
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 tools/ci/ci_changed_paths.py --base "$BASE_SHA" --head "$HEAD_SHA"

  windows-dotnet:
    name: .NET app and core
    runs-on: windows-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.windows_dotnet == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build Windows app
        shell: pwsh
        run: python tools\platform.py build windows
      - name: Test Windows core
        shell: pwsh
        run: python tools\platform.py test windows-core

  windows-typescript:
    name: WebUI tests
    runs-on: windows-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.windows_typescript == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json
      - name: Install WebUI dependencies
        run: npm ci --ignore-scripts
        working-directory: platform/typescript
      - name: WebUI typecheck
        run: npm run check
        working-directory: platform/typescript
      - name: WebUI tests
        run: npm test
        working-directory: platform/typescript

  windows-gio:
    name: Gio shell
    runs-on: windows-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.windows_go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
      - name: Build Gio shell
        shell: pwsh
        run: |
          Set-Location exp-platform/go/gio
          go build ./...

  windows-dioxus:
    name: Dioxus shell
    runs-on: windows-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.windows_dioxus == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json
      - name: Install WebUI dependencies
        run: npm ci --ignore-scripts
        working-directory: platform/typescript
      - name: Build Dioxus shell
        shell: pwsh
        run: python tools\platform.py build dioxus

  windows-tauri:
    name: Tauri WebUI package
    runs-on: windows-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.windows_tauri == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platform/typescript/package-lock.json
      - name: Install WebUI dependencies
        run: npm ci
        working-directory: platform/typescript
      - name: Build Tauri WebUI installer
        shell: pwsh
        run: python tools\platform.py package tauri
      - name: Upload Tauri WebUI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-webui-installer
          path: out/release/tauri/*.exe
          if-no-files-found: error

  windows-accessibility:
    name: Static accessibility
    runs-on: windows-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.windows_accessibility == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Static Windows accessibility smoke
        shell: pwsh
        run: ./tools/accessibility/windows_ax_smoke.ps1 -StaticOnly

  windows-native:
    runs-on: ubuntu-latest
    needs:
      - changes
      - windows-dotnet
      - windows-typescript
      - windows-gio
      - windows-dioxus
      - windows-tauri
      - windows-accessibility
    if: always()
    steps:
      - name: Verify selected Windows checks
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failed:
              print(f"Failing prerequisite jobs: {failed}", file=sys.stderr)
              sys.exit(1)
          print("Selected Windows native jobs completed successfully.")
          PY
